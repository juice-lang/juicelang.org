description = "The default layout of this website"
==
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>juice &ndash; {{ this.page.title }}</title>
        <meta name="description" content="{{ this.page.meta_description }}">
        <meta name="title" content="{{ this.page.meta_title }}">
        <meta name="author" content="Josef Zoller">
        <meta name="generator" content="OctoberCMS">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <link href="{{ 'assets/css/default.css'|theme }}" rel="stylesheet">

        {% styles %}
    </head>
    <body>
        <div class="uk-container uk-container-expand header">
            <nav class="uk-navbar-container uk-container uk-container-small uk-navbar-transparent uk-light" uk-navbar>
                <div class="uk-navbar-left">
                    <a class="uk-navbar-item uk-logo uk-text-italic uk-padding-small uk-padding-remove-left"
                       href="{{ 'home'|page }}">
                        juice
                    </a>
                </div>
                <div class="uk-navbar-right">
                    <div class="uk-navbar-item">
                        <div class="uk-text-large">
                            The <span class="uk-text-italic uk-text-bold">juicy</span> programming language
                        </div>
                    </div>
                </div>
            </nav>
        </div>
        <div class="uk-container uk-container-small uk-margin-large-top content">
            {% page %}
        </div>
        <div class="uk-container uk-container-small uk-margin-large-top footer">
            &copy; {{ 'now'|date('Y') }} juice-lang
        </div>

        <script src="{{ [
            '@jquery',
            'assets/js/uikit/uikit.min.js',
            'assets/js/uikit/uikit-icons.min.js',
            'assets/js/default.js'
        ]|theme }}"></script>
        {% framework extras %}
        {% scripts %}
    </body>
</html>
