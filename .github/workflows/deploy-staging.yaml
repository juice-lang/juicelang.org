name: Deploy branch master to staging.juicelang.org

on:
    push:
        branches: [ master ]
jobs:
    deploy-staging:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            - uses: ./.github/actions/deploy-action
              with:
                url: 'https://deploy.juicelang.org/staging'
                git-sha: ${{ github.sha }}
